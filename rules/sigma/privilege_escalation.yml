title: Named Pipe Impersonation for Privilege Escalation
id: bs-pe-003
status: stable
description: |
  Detects privilege escalation via named pipe impersonation. Adversaries create
  a named pipe server, trick a high-privileged process into connecting as a client,
  then call ImpersonateNamedPipeClient() to steal the token. Commonly used by
  exploits like JuicyPotato, PrintSpoofer, and RoguePotato.
references:
  - https://attack.mitre.org/techniques/T1134/001/
  - https://itm4n.github.io/printspoofer-abusing-impersonate-privileges/
author: Valon Canolli
date: 2024-01-01
modified: 2024-01-01
tags:
  - attack.privilege_escalation
  - attack.t1134.001
  - attack.t1055
logsource:
  product: windows
  category: pipe_created
detection:
  selection_suspicious_pipes:
    PipeName|contains:
      - '\pipe\spoolss'
      - '\pipe\efsrpc'
      - '\pipe\lsarpc'
      - '\pipe\samr'
      - '\pipe\netlogon'
  selection_impersonation_tools:
    Image|contains:
      - 'JuicyPotato'
      - 'PrintSpoofer'
      - 'RoguePotato'
      - 'SweetPotato'
      - 'GodPotato'
  selection_exploit_indicator:
    EventID: 4688
    CommandLine|contains:
      - '\pipe\'
      - 'ImpersonateNamedPipeClient'
      - '-p cmd'
      - '-c "{{'
  condition: selection_suspicious_pipes or selection_impersonation_tools or selection_exploit_indicator
fields:
  - PipeName
  - Image
  - CommandLine
  - User
  - Computer
falsepositives:
  - Legitimate applications communicating via named pipes
  - Antivirus or EDR products monitoring pipe activity
level: critical
